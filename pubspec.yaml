name: bbplay
description: BBplay Flutter Application.
publish_to: 'none' # Запрещает случайную публикацию на pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter_html: ^3.0.0-beta.2
  crypto: ^3.0.3
  webview_flutter: ^4.7.0

  url_launcher: ^6.3.0
  flutter:
    sdk: flutter
    

  # State Management (Управление состоянием)
  provider: ^6.1.2

  # UI, Шрифты и Иконки
  google_fonts: ^6.2.1
  http: ^1.2.0
  font_awesome_flutter: ^10.7.0
  curved_navigation_bar: ^1.0.3

  # Local Storage
  shared_preferences: ^2.2.2

  cupertino_icons: ^1.0.6
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # Раскомментируй и добавь пути, если в проекте появятся локальные картинки
  # assets:
  #   - assets/images/